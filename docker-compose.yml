networks:
  multichain-net:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # NODE 1 — Master Node (creates the chain)
  # ─────────────────────────────────────────
  node1:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: node1
    hostname: node1
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - P2P_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
    ports:
      - "7418:7418"
      - "7419:7419"
    volumes:
      - node1-data:/root/.multichain
    networks:
      - multichain-net

  # ─────────────────────────────────────────
  # NODE 2 — Peer Node
  # ─────────────────────────────────────────
  node2:
    build:
      context: .
      dockerfile: Dockerfile.peer
    container_name: node2
    hostname: node2
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - P2P_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
      - MASTER_NODE=node1
    ports:
      - "7420:7418"
      - "7421:7419"
    volumes:
      - node2-data:/root/.multichain
    networks:
      - multichain-net
    depends_on:
      - node1

  # ─────────────────────────────────────────
  # NODE 3 — Peer Node
  # ─────────────────────────────────────────
  node3:
    build:
      context: .
      dockerfile: Dockerfile.peer
    container_name: node3
    hostname: node3
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - P2P_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
      - MASTER_NODE=node1
    ports:
      - "7422:7418"
      - "7423:7419"
    volumes:
      - node3-data:/root/.multichain
    networks:
      - multichain-net
    depends_on:
      - node1

volumes:
  node1-data:
  node2-data:
  node3-data:
