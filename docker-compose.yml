version: "3.8"

networks:
  multichain-net:
    driver: bridge

services:

  # ─────────────────────────────────────────
  # NODE 1 — Master Node (creates the chain)
  # ─────────────────────────────────────────
  node1:
    image: ${MULTICHAIN_IMAGE:-pranavt61/multichain-docker}
    container_name: node1
    hostname: node1
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - NETWORK_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
      - IS_MASTER=true
    ports:
      - "7418:7418"   # P2P
      - "7419:7419"   # RPC
    volumes:
      - node1-data:/root/.multichain
    networks:
      - multichain-net
    healthcheck:
      test: ["CMD-SHELL", "multichain-cli ${CHAIN_NAME:-mychain} getinfo || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # NODE 2 — Peer Node
  # ─────────────────────────────────────────
  node2:
    image: ${MULTICHAIN_IMAGE:-pranavt61/multichain-docker}
    container_name: node2
    hostname: node2
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - NETWORK_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
      - MASTER_NODE=node1
      - IS_MASTER=false
    ports:
      - "7420:7418"   # P2P (mapped to host 7420)
      - "7421:7419"   # RPC (mapped to host 7421)
    volumes:
      - node2-data:/root/.multichain
    networks:
      - multichain-net
    depends_on:
      node1:
        condition: service_healthy

  # ─────────────────────────────────────────
  # NODE 3 — Peer Node
  # ─────────────────────────────────────────
  node3:
    image: ${MULTICHAIN_IMAGE:-pranavt61/multichain-docker}
    container_name: node3
    hostname: node3
    environment:
      - CHAIN_NAME=${CHAIN_NAME:-mychain}
      - NETWORK_PORT=${P2P_PORT:-7418}
      - RPC_PORT=${RPC_PORT:-7419}
      - RPC_USER=${RPC_USER:-multichainrpc}
      - RPC_PASSWORD=${RPC_PASSWORD:-password123}
      - MASTER_NODE=node1
      - IS_MASTER=false
    ports:
      - "7422:7418"   # P2P (mapped to host 7422)
      - "7423:7419"   # RPC (mapped to host 7423)
    volumes:
      - node3-data:/root/.multichain
    networks:
      - multichain-net
    depends_on:
      node1:
        condition: service_healthy

volumes:
  node1-data:
  node2-data:
  node3-data:
